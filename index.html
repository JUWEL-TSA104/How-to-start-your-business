<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Planning Assessment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Hind+Siliguri:wght@400;600;700&display=swap');

        :root {
            --primary: #6c5ce7;
            --success: #00b894;
            --danger: #d63031;
            --bg: #f0f3f7;
            --text: #2d3436;
            --shadow: 9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5);
            --inner-shadow: inset 6px 6px 12px #c1c9d7, inset -6px -6px 12px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s ease; }
        body { font-family: 'Poppins', 'Hind Siliguri', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        
        .container { background: var(--bg); width: 100%; max-width: 500px; border-radius: 30px; box-shadow: var(--shadow); padding: 30px; text-align: center; position: relative; }
        
        #custom-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #ff7675; color: white; padding: 12px 25px; border-radius: 50px; font-weight: 600; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 2000; transition: 0.5s; opacity: 0; }
        #custom-alert.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .header h2 { color: var(--primary); font-size: 1.3rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        
        .lang-box { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .lang-btn { padding: 8px 15px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; background: var(--bg); box-shadow: var(--shadow); font-size: 0.8rem; }
        .lang-btn.active { box-shadow: var(--inner-shadow); color: var(--primary); }

        .input-box { text-align: left; margin-bottom: 15px; }
        .input-box label { font-size: 0.75rem; font-weight: 700; color: #7f8c8d; margin-left: 10px; text-transform: uppercase; }
        .neumorph-input { width: 100%; padding: 12px; border: none; background: var(--bg); border-radius: 12px; box-shadow: var(--inner-shadow); outline: none; margin-top: 5px; font-family: inherit; }

        .btn { padding: 15px; border: none; border-radius: 15px; cursor: pointer; font-weight: 700; background: var(--bg); box-shadow: var(--shadow); color: var(--primary); font-size: 1rem; }
        .btn-start { width: 100%; background: var(--primary); color: white; margin-top: 10px; text-decoration: none; display: inline-block; }
        .btn:active { box-shadow: var(--inner-shadow); transform: scale(0.98); }

        .hidden { display: none; }
        .option { padding: 15px; margin-bottom: 12px; border-radius: 12px; cursor: pointer; background: var(--bg); box-shadow: var(--shadow); text-align: left; font-size: 0.95rem; }
        .option.selected { box-shadow: var(--inner-shadow); color: var(--primary); font-weight: 700; border-left: 5px solid var(--primary); }

        .score-circle { width: 110px; height: 110px; margin: 20px auto; position: relative; }
        .score-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        circle { fill: none; stroke-width: 8; stroke: #dfe6e9; stroke-dasharray: 283; }
        .progress-bar { stroke: var(--primary); stroke-dashoffset: 283; transition: 1.5s ease-out; stroke-linecap: round; }

        .review-container { text-align: left; margin-top: 25px; max-height: 250px; overflow-y: auto; padding-right: 10px; border-top: 1px solid #ddd; padding-top: 15px; }
        .review-item { padding: 10px; margin-bottom: 10px; border-radius: 10px; box-shadow: var(--inner-shadow); font-size: 0.85rem; }

        #selection-notice { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5); background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000; text-align: center; visibility: hidden; opacity: 0; transition: 0.5s; width: 85%; max-width: 400px; }
        #selection-notice.show { visibility: visible; opacity: 1; transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

<div id="custom-alert">⚠️ Please complete this field!</div>

<div id="selection-notice">
    <span style="font-size: 50px;">🌟</span>
    <h2 style="color: var(--success);">Congratulations!</h2>
    <p id="sel-text" style="font-weight: 700; margin: 10px 0; font-size: 1.1rem;"></p>
    <p>You are selected for the</p>
    <p style="font-weight: 700; color: var(--primary); font-size: 1.2rem; background: #eee; padding: 10px; border-radius: 12px; margin: 12px 0;">[ Life Changing Part 1-2 ] 🎓</p>
    <button class="btn" onclick="closeNotice()" style="width: 100%; margin-top: 15px; background: var(--success); color: white;">Proceed</button>
</div>

<div class="container">
    <div class="header">
        <h2 id="main-title">Business Planning</h2>
        <div class="lang-box">
            <button id="en-btn" class="lang-btn active" onclick="setLang('en')">English</button>
            <button id="bn-btn" class="lang-btn" onclick="setLang('bn')">বাংলা</button>
        </div>
    </div>

    <div id="welcome">
        <div style="margin-bottom: 5px; font-weight: 700; color: var(--primary); font-size: 1.1rem;">Provided by Juwel Rana Sir</div>
        <div style="margin-bottom: 25px; font-size: 0.8rem; color: #636e72; font-weight: 600; line-height: 1.4;">
            Corporate Trainer - Co Founder - Assistant Manager
        </div>
        
        <div class="input-box">
            <label id="label-name">FULL NAME</label>
            <input type="text" id="userName" class="neumorph-input" placeholder="...">
        </div>
        <div class="input-box">
            <label id="label-mentor">MENTOR NAME</label>
            <input type="text" id="mentorName" class="neumorph-input" placeholder="...">
        </div>
        <button class="btn btn-start" id="start-btn" onclick="startQuiz()">START ASSESSMENT</button>
    </div>

    <div id="quiz" class="hidden">
        <p id="progress" style="font-weight: 700; color: var(--primary); margin-bottom: 10px; font-size: 0.9rem;"></p>
        <h3 id="question" style="margin-bottom: 20px; font-size: 1rem; color: var(--text);"></h3>
        <div id="options"></div>
        <div id="text-input-area" class="hidden">
            <textarea id="writtenAns" class="neumorph-input" rows="4" placeholder="..." style="resize: none;"></textarea>
        </div>
        <div style="display: flex; justify-content: space-between; margin-top: 20px; gap: 15px;">
            <button class="btn" id="prevBtn" onclick="prev()"><i class="fa-solid fa-arrow-left"></i></button>
            <button class="btn" style="flex:1" id="nextBtn" onclick="next()">NEXT</button>
        </div>
    </div>

    <div id="result" class="hidden">
        <h2 id="res-title" style="font-size: 1.2rem; color: var(--primary);">Result</h2>
        <div class="score-circle">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45"></circle>
                <circle id="ring" class="progress-bar" cx="50" cy="50" r="45"></circle>
            </svg>
            <div class="score-text" id="pctText">0%</div>
        </div>
        <div id="review-list" class="review-container"></div>
        <a href="https://m.me/juwelrana.official" class="btn btn-start" id="back-mentor">BACK TO MENTOR</a>
    </div>
</div>

<script>
    // আপনার নতুন Apps Script URL এখানে আপডেট করা হয়েছে
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyOyx0GCRfHKqSOR3prDt_dc4oUd7z226eqVPdeC3LUjBz6KZL7fTl-QXT0WeM7Em8nHQ/exec";
    
    let currentLang = 'en';
    let currentIdx = 0;
    let userAnswers = [];

    const translations = {
        en: { title: "Business Planning", start: "START ASSESSMENT", name: "FULL NAME", mentor: "MENTOR NAME", next: "NEXT", finish: "FINISH", alertName: "Enter Name!", alertMentor: "Enter Mentor!", alertQuiz: "Pick an answer!", back: "BACK TO MENTOR", res: "Final Result" },
        bn: { title: "বিজনেস প্ল্যানিং", start: "শুরু করুন", name: "আপনার নাম", mentor: "মেন্টরের নাম", next: "পরবর্তী", finish: "শেষ করুন", alertName: "নাম লিখুন!", alertMentor: "মেন্টরের নাম লিখুন!", alertQuiz: "উত্তর বেছে নিন!", back: "মেন্টরের কাছে ফিরে যান", res: "ফলাফল" }
    };

    const quizData = [
        { q_en: "1. CC comes from", q_bn: "১. সিসি (CC) আসে মূলত-", a_en: ["Using Products", "Retailing Products", "Both of the above"], a_bn: ["পণ্য ব্যবহারের মাধ্যমে", "পণ্য বিক্রির মাধ্যমে", "উপরের উভয়ই"], ans: 2 },
        { q_en: "2. What's the amount in 2cc Business Transaction", q_bn: "২. ২ সিসি বিজনেস ট্রানজিশনের পরিমাণ-", a_en: ["58320 in MRP", "55547 in PC", "Both 'a' & 'b'"], a_bn: ["৫৮৩২০ (MRP)", "৫৫৫৪৭ (PC)", "উভয় 'a' ও 'b'"], ans: 2 },
        { q_en: "3. Why 2cc in 'Fast Track' is important?", q_bn: "৩. 'ফাস্ট ট্র্যাকে' ২ সিসি করা কেন গুরুত্বপূর্ণ?", a_en: ["Mentorship of Founder", "Gateway to International Business", "Make Passive Income", "all of them"], a_bn: ["ফাউন্ডারের মেন্টরশিপ", "আন্তর্জাতিক ব্যবসার সুযোগ", "প্যাসিভ ইনকাম", "সবগুলোই"], ans: 3 },
        { q_en: "4. I'm planning for 2cc in", q_bn: "৪. আমি ২ সিসি করার পরিকল্পনা করছি-", a_en: ["Fast Track", "Medium Track", "Slow Track"], a_bn: ["ফাস্ট ট্র্যাক", "মিডিয়াম ট্র্যাক", "স্লো ট্র্যাক"], ans: "dynamic" },
        { q_en: "5. What's you plan for 2cc business?", q_bn: "৫. ২ সিসি বিজনেসের জন্য আপনার পরিকল্পনা কী?", type: "written" },
        { q_en: "6. Growth Mindset thinks", q_bn: "৬. গ্রোথ মাইন্ডসেট সম্পন্ন ব্যক্তি মনে করে-", a_en: ["I can do it anyhow", "I can learn how", "I accept challenges", "all of the above"], a_bn: ["আমি যেকোনোভাবে পারব", "আমি শিখে নেব", "আমি চ্যালেঞ্জ গ্রহণ করি", "সবগুলোই"], ans: 3 },
        { q_en: "7. Is doing 2cc is a Risk or Big Opportunity? Explain.", q_bn: "৭. ২ সিসি করা কি ঝুঁকি নাকি বড় সুযোগ? ব্যাখ্যা করুন।", type: "written" },
        { q_en: "8. 2cc business should be", q_bn: "৮. ২ সিসি বিজনেস হতে হয়-", a_en: ["in home country", "within 2 consecutive months", "Products Turnover", "all of them"], a_bn: ["নিজ দেশে", "টানা ২ মাসের মধ্যে", "প্রোডাক্ট টার্নওভার", "সবগুলোই"], ans: 1 },
        { q_en: "9. By when you're committed to complete 2cc?", q_bn: "৯. আপনি কতদিনের মধ্যে ২ সিসি শেষ করতে প্রতিশ্রুতিবদ্ধ?", type: "written" },
        { q_en: "10. Can you ensure Opening business account by 5k billing within 5 days?", q_bn: "১০. ৫ দিনের মধ্যে ৫০০০ টাকার বিলিং করে একাউন্ট ওপেন করা নিশ্চিত করতে পারবেন?", a_en: ["Off course", "I'll try my best", "I can't"], a_bn: ["অবশ্যই", "আমি চেষ্টা করব", "পারব না"], ans: 0 }
    ];

    userAnswers = new Array(quizData.length).fill(null);

    function setLang(lang) {
        currentLang = lang;
        document.getElementById('en-btn').classList.toggle('active', lang === 'en');
        document.getElementById('bn-btn').classList.toggle('active', lang === 'bn');
        document.getElementById('main-title').innerText = translations[lang].title;
        document.getElementById('label-name').innerText = translations[lang].name;
        document.getElementById('label-mentor').innerText = translations[lang].mentor;
        document.getElementById('start-btn').innerText = translations[lang].start;
        document.getElementById('back-mentor').innerText = translations[lang].back;
        document.getElementById('res-title').innerText = translations[lang].res;
        if(!document.getElementById('quiz').classList.contains('hidden')) renderQuestion();
    }

    function showAlert(msg) {
        const alertBox = document.getElementById('custom-alert');
        alertBox.innerText = msg;
        alertBox.classList.add('show');
        setTimeout(() => alertBox.classList.remove('show'), 3000);
    }

    function startQuiz() {
        if(!document.getElementById('userName').value.trim() || !document.getElementById('mentorName').value.trim()) return showAlert(translations[currentLang].alertName);
        document.getElementById('welcome').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('progress').innerText = (currentLang === 'en' ? "Question: " : "প্রশ্ন: ") + `${currentIdx + 1} / 10`;
        document.getElementById('question').innerText = currentLang === 'en' ? q.q_en : q.q_bn;
        const optBox = document.getElementById('options');
        const txtArea = document.getElementById('text-input-area');
        optBox.innerHTML = ""; txtArea.classList.add('hidden');

        if(q.type === "written") {
            txtArea.classList.remove('hidden');
            document.getElementById('writtenAns').value = userAnswers[currentIdx] || "";
        } else {
            const opts = currentLang === 'en' ? q.a_en : q.a_bn;
            opts.forEach((text, i) => {
                const div = document.createElement('div');
                div.className = `option ${userAnswers[currentIdx] === i ? 'selected' : ''}`;
                div.innerText = text;
                div.onclick = () => { userAnswers[currentIdx] = i; renderQuestion(); };
                optBox.appendChild(div);
            });
        }
        document.getElementById('prevBtn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('nextBtn').innerText = currentIdx === 9 ? translations[currentLang].finish : translations[currentLang].next;
    }

    function next() {
        const q = quizData[currentIdx];
        if(q.type === "written") {
            const val = document.getElementById('writtenAns').value.trim();
            if(!val) return showAlert(translations[currentLang].alertQuiz);
            userAnswers[currentIdx] = val;
        } else if(userAnswers[currentIdx] === null) return showAlert(translations[currentLang].alertQuiz);
        
        if(currentIdx < 9) { currentIdx++; renderQuestion(); } else { showResult(); }
    }

    function prev() { if(currentIdx > 0) { currentIdx--; renderQuestion(); } }

    function showResult() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        
        let score = 0;
        let finalAnswersForSheet = []; // শিটে পাঠানোর জন্য উত্তরের লিস্ট
        const revBox = document.getElementById('review-list');
        revBox.innerHTML = "";

        userAnswers.forEach((ans, i) => {
            const q = quizData[i];
            let isCorrect = false;
            let displayAnsText = "";

            if(q.type === "written") {
                isCorrect = true;
                displayAnsText = ans; // ইউজারের লেখা উত্তর
            } else {
                displayAnsText = (currentLang === 'en' ? q.a_en[ans] : q.a_bn[ans]); // সিলেক্ট করা অপশনের টেক্সট
                if(q.ans === "dynamic" || ans === q.ans) isCorrect = true;
            }

            if(isCorrect) score++;
            finalAnswersForSheet.push(displayAnsText);

            const item = document.createElement('div');
            item.className = "review-item";
            const qTxt = currentLang === 'en' ? q.q_en : q.q_bn;
            item.innerHTML = `<b>${qTxt}</b><br><span style="color:${isCorrect ? 'var(--success)' : 'var(--danger)'}">${displayAnsText}</span>`;
            revBox.appendChild(item);
        });

        let pct = Math.round((score / 10) * 100);
        document.getElementById('pctText').innerText = pct + "%";
        document.getElementById('ring').style.strokeDashoffset = 283 - (283 * pct / 100);

        if(pct >= 50) {
            setTimeout(() => {
                document.getElementById('sel-text').innerText = "Dear, " + document.getElementById('userName').value;
                document.getElementById('selection-notice').classList.add('show');
            }, 1000);
        }
        
        // গুগল শিটে ডেটা পাঠানো
        fetch(SCRIPT_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ 
                name: document.getElementById('userName').value, 
                mentor: document.getElementById('mentorName').value, 
                percentage: pct + "%", 
                answers: finalAnswersForSheet // এখানে অপশনের ইনডেক্স না পাঠিয়ে সরাসরি টেক্সট পাঠানো হচ্ছে
            }) 
        });
    }

    function closeNotice() { document.getElementById('selection-notice').classList.remove('show'); }
</script>
</body>
</html>
